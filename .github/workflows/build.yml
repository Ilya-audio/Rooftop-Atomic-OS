name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Очистка места (Gethub по умолчанию забит мусором)
      # Это даст нам дополнительные ~20ГБ места
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. Собираем контейнер через Buildah
      - name: Build image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      # 4. Сохраняем образ в локальный tar-архив
      # Это нужно, чтобы билдер мог прочитать его без сети
      - name: Save image as tar
        run: |
          buildah push rooftop-atomic:latest docker-archive:${{ github.workspace }}/rooftop-atomic.tar

      # 5. Сборка ISO (Rootful режим через sudo)
      - name: Build ISO using bootc-image-builder
        run: |
          mkdir -p ./output
          # Запускаем через sudo, чтобы избежать ошибки "must be run in rootful"
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v ${{ github.workspace }}:/workspace:rw \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --config /workspace/config.toml \
            --output /workspace/output \
            --type iso \
            docker-archive:/workspace/rooftop-atomic.tar

      # 6. Загружаем готовый ISO в артефакты GitHub
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          path: ./output/iso/*.iso
          if-no-files-found: error
