name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Убираем лишние файлы для диска
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. Сборка образа через Buildah
      - name: Build image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      # 4. Запуск локального registry для rootful Podman
      - name: Start local Podman registry
        run: |
          sudo podman run -d --name registry -p 5000:5000 --restart=always docker.io/library/registry:2

      # 5. Push собранного образа в локальный registry
      - name: Push image to local registry
        run: |
          sudo podman tag rooftop-atomic:latest localhost:5000/rooftop-atomic:latest
          sudo podman push localhost:5000/rooftop-atomic:latest

      # 6. Сборка ISO через bootc-image-builder (rootful, с монтированием overlay)
      - name: Build ISO using bootc-image-builder
        run: |
          mkdir -p ./output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage:rw \
            -v ${{ github.workspace }}:/workspace:rw \
            -v ${{ github.workspace }}/output:/output:rw \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --config /workspace/config.toml \
            --output /output \
            --type anaconda-iso \
            localhost:5000/rooftop-atomic:latest

      # 7. Загрузка ISO как артефакта
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          path: ./output/**/*.iso
          if-no-files-found: error
