name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Собираем контейнер (образ попадет в /var/lib/containers/storage)
      - name: Build Container Image
        run: |
          sudo buildah bud -t rooftop-atomic:latest .

      # 3. Сборка ISO через прямой проброс хранилища и твоего config.toml
      - name: Build ISO
        run: |
          mkdir -p ./output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v $(pwd)/output:/output \
            -v $(pwd)/config.toml:/config.toml:ro \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --config /config.toml \
            --output /output \
            --type anaconda-iso \
            --rootfs ext4 \
            localhost/rooftop-atomic:latest

      # 4. Загружаем готовый ISO в артефакты
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          path: ./output/**/*.iso
          if-no-files-found: error
