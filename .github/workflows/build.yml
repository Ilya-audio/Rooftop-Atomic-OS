name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Container Image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      - name: Debug - List files
        run: |
          pwd
          ls -R

      - name: Build ISO using bootc-image-builder
        uses: osbuild/bootc-image-builder-action@main
        with:
          image: localhost/rooftop-atomic:latest
          config-file: ${{ github.workspace }}/config.toml
          types: iso
