name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Сборка контейнера через Buildah
      - name: Build image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      # 3. Сохраняем образ в tar
      - name: Save image as tar
        run: |
          mkdir -p ./builder_storage
          buildah push rooftop-atomic:latest docker-archive:${{ github.workspace }}/rooftop-atomic.tar

      # 4. Сборка ISO через bootc-image-builder
      - name: Build ISO using bootc-image-builder
        run: |
          mkdir -p ./output
          sudo podman run --rm --privileged \
            -v ${{ github.workspace }}:/workspace:rw \
            -v ${{ github.workspace }}/builder_storage:/var/lib/containers/storage:rw \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --archive /workspace/rooftop-atomic.tar \
            --config /workspace/config.toml \
            --output /workspace/output \
            --type anaconda-iso

      # 5. Загружаем ISO как артефакт
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          path: ./output/**/*.iso
          if-no-files-found: error
