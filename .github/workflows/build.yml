name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Клонируем код
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Очистка места на диске (Критически важно для Fedora)
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. Сборка контейнера через Buildah
      - name: Build image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      # 4. Сохраняем образ в файл .tar
      - name: Save image as tar
        run: |
          buildah push rooftop-atomic:latest docker-archive:${{ github.workspace }}/rooftop-atomic.tar

      # 5. Сборка ISO через bootc-image-builder
      - name: Build ISO using bootc-image-builder
        run: |
          mkdir -p ./output
          mkdir -p ./builder_storage
          
          # Запускаем через sudo для rootful режима. 
          # Монтируем рабочую папку и отдельное хранилище для контейнеров.
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v ${{ github.workspace }}:/workspace:rw \
            -v ${{ github.workspace }}/builder_storage:/var/lib/containers/storage:rw \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --config /workspace/config.toml \
            --output /workspace/output \
            --type iso \
            docker-archive:/workspace/rooftop-atomic.tar

      # 6. Загрузка готового ISO в артефакты
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          # Ищем любой .iso файл в папке output и глубже
          path: ./output/**/*.iso
          if-no-files-found: error
