name: Build Rooftop ISO
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Очистка места на диске (для Fedora это полезно)
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 3. Сборка контейнера через Buildah
      - name: Build image with Buildah
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: rooftop-atomic
          tags: latest
          containerfiles: ./Containerfile

      # 4. Сборка ISO напрямую из локального образа
      - name: Build ISO using bootc-image-builder
        run: |
          mkdir -p ./output
          mkdir -p ./builder_storage

          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v ${{ github.workspace }}:/workspace:rw \
            -v ${{ github.workspace }}/builder_storage:/var/lib/containers/storage:rw \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --image localhost/rooftop-atomic:latest \
            --config /workspace/config.toml \
            --output /workspace/output \
            --type anaconda-iso

      # 5. Загрузка готового ISO в артефакты
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Rooftop-Atomic-ISO
          path: ./output/**/*.iso
          if-no-files-found: error
